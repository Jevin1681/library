{% extends "base.html" %}
{% block title %}<title>Buy Book</title>{% endblock %}
{% block content %}

<div class="see-container">
        <h1>Buy Book</h1>
        <div class="buy-form">
            <form action="{{ url_for("buyBook")}}" method="POST">
                <input type="text" name="buy-book" placeholder="Enter Book Name" required>
                <button class="buy-btn" type="submit">Buy Now</button>
            </form>
        </div>
        <div class="all-books-div">
            {% for books in book_list %}
            {% if books %}
            <li>{{ books[0] }}</li>
            {% endif %}
            {% endfor %}
        </div>
    </div>

{% endblock %}
